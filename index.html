<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台南活動記錄</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; }
    header { background: #1a1a2e; color: #fff; padding: 20px 24px; }
    header h1 { font-size: 1.4rem; }
    header p { font-size: 0.85rem; color: #aaa; margin-top: 4px; }
    .layout { display: flex; min-height: calc(100vh - 68px); }
    aside { width: 180px; flex-shrink: 0; background: #fff; border-right: 1px solid #ddd; padding: 16px 0; }
    aside ul { list-style: none; }
    aside ul li a { display: block; padding: 10px 20px; font-size: 0.9rem; color: #444; text-decoration: none; border-left: 3px solid transparent; }
    aside ul li a:hover, aside ul li a.active { background: #f0f4ff; color: #1a1a2e; border-left-color: #4a6cf7; font-weight: 600; }
    main { flex: 1; padding: 32px; max-width: 860px; }
    #content h1 { font-size: 1.4rem; margin-bottom: 16px; color: #1a1a2e; }
    #content h2 { font-size: 1.05rem; margin: 24px 0 10px; border-bottom: 2px solid #e0e0e0; padding-bottom: 6px; color: #333; }
    #content ul { padding-left: 0; list-style: none; }
    #content ul li { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; line-height: 1.8; }
    #content strong { color: #1a1a2e; }
    #content a { color: #4a6cf7; word-break: break-all; }
    #content hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }
    #placeholder { color: #999; font-size: 1rem; margin-top: 60px; text-align: center; }
    @media (max-width: 600px) {
      .layout { flex-direction: column; }
      aside { width: 100%; border-right: none; border-bottom: 1px solid #ddd; overflow-x: auto; }
      aside ul { display: flex; padding: 0 8px; }
      aside ul li a { white-space: nowrap; padding: 10px 14px; border-left: none; border-bottom: 3px solid transparent; }
      aside ul li a.active { border-left-color: transparent; border-bottom-color: #4a6cf7; }
      main { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📅 台南活動記錄</h1>
    <p>每日活動彙整・來源：台南文化局、文化中心、美術館、各大場館</p>
  </header>
  <div class="layout">
    <aside>
      <ul id="date-list"><li style="padding:16px;color:#999;font-size:0.85rem">載入中…</li></ul>
    </aside>
    <main>
      <div id="content"><p id="placeholder">← 選擇左側日期查看活動</p></div>
    </main>
  </div>
  <script>
    async function loadDates() {
      try {
        const res = await fetch('dates.json?t=' + Date.now());
        const dates = await res.json();
        const list = document.getElementById('date-list');
        list.innerHTML = '';
        if (!dates.length) {
          list.innerHTML = '<li style="padding:16px;color:#999;font-size:0.85rem">尚無資料</li>';
          return;
        }
        dates.sort((a, b) => b.localeCompare(a));
        dates.forEach((d, i) => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = '#';
          a.textContent = d;
          a.dataset.date = d;
          a.addEventListener('click', (e) => { e.preventDefault(); loadContent(d); });
          li.appendChild(a);
          list.appendChild(li);
          if (i === 0) loadContent(d);
        });
      } catch (e) {
        document.getElementById('date-list').innerHTML = '<li style="padding:16px;color:#c00;font-size:0.85rem">載入失敗</li>';
      }
    }

    async function loadContent(date) {
      document.querySelectorAll('#date-list a').forEach(a => {
        a.classList.toggle('active', a.dataset.date === date);
      });
      try {
        const res = await fetch('output/' + date + '.md?t=' + Date.now());
        const md = await res.text();
        document.getElementById('content').innerHTML = marked.parse(md);
      } catch (e) {
        document.getElementById('content').innerHTML = '<p style="color:#c00">內容載入失敗</p>';
      }
    }

    loadDates();
  </script>
</body>
</html>
